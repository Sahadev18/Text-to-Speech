<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/contact.css">
    <title>Login</title>
</head>
<body>
    <div class="contact">
        <h1>Contact us</h1>
        <p>We welcome any questions, technical inquiries, bug reports, suggestions, or other issues you may have. Please feel free to contact us.
            You can expect a response from us within 2 to 12 hours.</p>
        <div class="name" style="display: flex; background-color: white;">
            <p style="background-color: white;">Name:</p>
            <input type="text" style="background-color: white;">
        </div>
        <div class="mail" style="display: flex; background-color: white;">
            <p style="background-color: white;">Email:</p>
            <input type="password" style="background-color: white;">
        </div>
        <div class="ttarea" style="display: flex; background-color: white;">
            <p style="background-color: white;">Meassage:</p>
            <textarea name="txtarea" id="txtarea" cols="30" rows="10"></textarea>
        </div>
        <button class="btn1">Submit</button>
        <a href="index.html"><button class="btn2">Cancel</button></a>
    </div>
</body>
</html>
